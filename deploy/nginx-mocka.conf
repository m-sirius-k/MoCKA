server {
    listen 80;
    server_name mocka.nsjp.org;
    # HTTP → HTTPS リダイレクト（certbot が自動で書き換え）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mocka.nsjp.org;

    # certbot が自動設定するので以下はプレースホルダー
    ssl_certificate     /etc/letsencrypt/live/mocka.nsjp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mocka.nsjp.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # MCP エンドポイントはストリームを維持するためバッファを切る
    proxy_buffering off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass         http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
