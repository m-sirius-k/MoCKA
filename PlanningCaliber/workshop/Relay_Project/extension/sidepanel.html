<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Relay — Side Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0a0e1a;
      --bg-panel:   #111827;
      --bg-card:    #141e33;
      --border:     #1e3a5f;
      --border-dim: #162032;
      --text-main:  #e2e8f0;
      --text-sub:   #64748b;
      --text-dim:   #334155;
      --accent:     #38bdf8;
      --accent-dim: #0c4a6e;
      --safe:       #22c55e;
      --warn:       #f59e0b;
      --danger:     #ef4444;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    .label {
      font-size: 9px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-sub);
    }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border-dim);
      background: #0d1628;
      position: sticky; top: 0; z-index: 10;
    }

    .header-logo { display: flex; align-items: center; gap: 8px; }
    .logo-text {
      font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 800;
      color: var(--accent); letter-spacing: -0.5px;
    }

    .header-actions { display: flex; align-items: center; gap: 6px; }

    .icon-btn {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border-dim); background: transparent;
      color: var(--text-sub); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .icon-btn:hover { border-color: var(--border); color: var(--text-main); }
    .icon-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(56,189,248,0.08);
    }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border-dim);
      background: var(--bg-panel);
    }
    .tab {
      flex: 1; padding: 9px 0; text-align: center;
      font-size: 11px; font-weight: 600; color: var(--text-sub);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.3px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text-main); }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Stats strip */
    .stats-strip {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 1px; background: var(--border-dim);
      border-bottom: 1px solid var(--border-dim);
    }
    .stat-cell {
      background: var(--bg-panel); padding: 8px 12px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .stat-val { font-size: 16px; font-weight: 700; color: var(--text-main); }
    .stat-val.warn   { color: var(--warn); }
    .stat-val.danger { color: var(--danger); }
    .stat-val.safe   { color: var(--safe); }

    /* TODO panel */
    .panel-body { padding: 10px 12px; }

    .section-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }

    .badge {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      background: var(--accent-dim); color: var(--accent);
      border-radius: 10px; padding: 1px 7px;
    }

    .todo-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 9px; background: var(--bg-card);
      border: 1px solid var(--border-dim); border-radius: 7px;
      margin-bottom: 5px; transition: border-color 0.2s;
    }
    .todo-item:hover { border-color: var(--border); }
    .todo-item.done { opacity: 0.35; }
    .todo-item.done .todo-text { text-decoration: line-through; }

    .todo-num {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      color: var(--accent); background: var(--accent-dim);
      border-radius: 4px; padding: 2px 5px; flex-shrink: 0; margin-top: 1px;
    }

    .todo-check {
      width: 15px; height: 15px; border: 1px solid var(--border);
      border-radius: 3px; cursor: pointer; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .todo-check:hover { border-color: var(--safe); }
    .todo-check.checked { background: var(--safe); border-color: var(--safe); }

    .todo-text { flex: 1; font-size: 12px; color: var(--text-main); line-height: 1.4; }

    .todo-del {
      width: 16px; height: 16px; cursor: pointer; flex-shrink: 0;
      color: var(--text-dim); font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px; transition: color 0.2s, background 0.2s;
    }
    .todo-del:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    .todo-empty {
      text-align: center; padding: 24px; color: var(--text-dim);
      font-size: 12px; font-style: italic;
    }

    /* Add TODO input */
    .add-todo-row {
      display: flex; gap: 6px; margin-bottom: 12px;
    }
    .add-todo-input {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border-dim);
      border-radius: 6px; color: var(--text-main); font-size: 12px;
      padding: 7px 10px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .add-todo-input:focus { border-color: var(--accent); }
    .add-todo-input::placeholder { color: var(--text-dim); }
    .add-todo-btn {
      padding: 7px 12px; border-radius: 6px; border: 1px solid var(--accent);
      background: var(--accent-dim); color: var(--accent); font-size: 12px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    .add-todo-btn:hover { background: rgba(56,189,248,0.15); }

    /* Filter chips */
    .filter-chips { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .chip {
      font-size: 10px; padding: 3px 9px; border-radius: 99px;
      border: 1px solid var(--border-dim); background: var(--bg-panel);
      color: var(--text-sub); cursor: pointer; transition: all 0.2s;
    }
    .chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* Handoff panel */
    .handoff-box {
      background: var(--bg-card); border: 1px solid var(--border-dim);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
      font-size: 11px; color: var(--text-sub); line-height: 1.6;
      white-space: pre-wrap; max-height: 300px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
    }
    .handoff-box::-webkit-scrollbar { width: 3px; }
    .handoff-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .btn-primary {
      width: 100%; padding: 11px; border-radius: 8px;
      border: 1px solid var(--accent);
      background: linear-gradient(135deg, #0c4a6e, #0369a1);
      color: var(--accent); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 6px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(56,189,248,0.2); }
    .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }

    .feedback {
      text-align: center; font-size: 11px; height: 16px;
      transition: opacity 0.3s; color: var(--safe); margin-top: 4px;
    }
    .feedback.error { color: var(--danger); }

    /* Break-even bar */
    .be-bar-track {
      height: 6px; background: var(--bg-panel); border-radius: 3px;
      overflow: hidden; border: 1px solid var(--border-dim); margin: 6px 0;
    }
    .be-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #22c55e 0%, #38bdf8 60%, #f59e0b 100%);
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1); width: 0%;
    }
    .be-bar-fill.over { background: var(--danger); }

    .divider { height: 1px; background: var(--border-dim); margin: 10px 0; }

    /* Scrollbar global */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L25 8.5V19.5L14 26L3 19.5V8.5L14 2Z"
              stroke="#38bdf8" stroke-width="1.5" fill="rgba(56,189,248,0.06)"/>
        <text x="9" y="19" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="800">R</text>
      </svg>
      <span class="logo-text">RELAY</span>
    </div>
    <div class="header-actions">
      <!-- ポップアップに戻るボタン -->
      <button class="icon-btn" id="btn-to-popup" title="ポップアップに切り替え">⬡</button>
    </div>
  </div>

  <!-- Stats strip -->
  <div class="stats-strip">
    <div class="stat-cell">
      <span class="label">CPI</span>
      <span class="stat-val mono" id="sp-cpi">—</span>
    </div>
    <div class="stat-cell">
      <span class="label">TOKENS</span>
      <span class="stat-val mono" id="sp-tokens">0</span>
    </div>
    <div class="stat-cell">
      <span class="label">TURNS</span>
      <span class="stat-val mono" id="sp-turns">0</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="todo">TODO</div>
    <div class="tab" data-tab="handoff">引き継ぎ</div>
  </div>

  <!-- TODO tab -->
  <div class="tab-panel active" id="tab-todo">
    <div class="panel-body">

      <!-- Add TODO -->
      <div class="add-todo-row">
        <input type="text" class="add-todo-input" id="sp-todo-input"
               placeholder="TODOを手動追加...">
        <button class="add-todo-btn" id="sp-todo-add">追加</button>
      </div>

      <!-- Filter chips -->
      <div class="filter-chips">
        <div class="chip active" data-filter="active">未完了</div>
        <div class="chip" data-filter="done">完了済</div>
        <div class="chip" data-filter="all">すべて</div>
      </div>

      <!-- Section bar -->
      <div class="section-bar">
        <span class="label">TODO一覧</span>
        <span class="badge" id="sp-todo-count">0</span>
      </div>

      <!-- TODO list -->
      <div id="sp-todo-list">
        <div class="todo-empty">タスクはまだありません</div>
      </div>

    </div>
  </div>

  <!-- Handoff tab -->
  <div class="tab-panel" id="tab-handoff">
    <div class="panel-body">
      <div class="section-bar" style="margin-bottom:8px;">
        <span class="label">引き継ぎプレビュー</span>
        <button class="icon-btn" id="sp-refresh-handoff" title="再生成" style="width:22px;height:22px;font-size:12px;">↺</button>
      </div>

      <!-- Break-even -->
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-sub);">
          <span id="sp-be-margin">計算中...</span>
          <span class="mono" id="sp-be-pct" style="color:var(--accent);">0%</span>
        </div>
        <div class="be-bar-track"><div class="be-bar-fill" id="sp-be-bar"></div></div>
        <div style="font-size:10px;color:var(--text-dim);text-align:right;" id="sp-be-tstar"></div>
      </div>

      <div class="divider"></div>

      <div class="handoff-box" id="sp-handoff-preview">
        生成中...
      </div>

      <button class="btn-primary" id="sp-btn-handoff">⚡ 今すぐ引き継ぎ</button>
      <div class="feedback" id="sp-feedback"></div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
