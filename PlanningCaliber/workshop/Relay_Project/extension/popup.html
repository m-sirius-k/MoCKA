<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Relay</title>
  <style>
    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0a0e1a;
      --bg-panel:   #111827;
      --bg-card:    #141e33;
      --border:     #1e3a5f;
      --border-dim: #162032;
      --text-main:  #e2e8f0;
      --text-sub:   #64748b;
      --text-dim:   #334155;
      --accent:     #38bdf8;
      --accent-dim: #0c4a6e;
      --safe:       #22c55e;
      --warn:       #f59e0b;
      --danger:     #ef4444;
      --glow-safe:  0 0 12px rgba(34,197,94,0.45);
      --glow-warn:  0 0 12px rgba(245,158,11,0.45);
      --glow-danger:0 0 12px rgba(239,68,68,0.45);
    }

    body {
      width: 320px;
      min-height: 480px;
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .mono {
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }

    .label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-sub);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border-dim);
      background: linear-gradient(180deg, #0d1628 0%, var(--bg-deep) 100%);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-hex {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-hex svg { width: 28px; height: 28px; }

    .logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-shadow: 0 0 12px rgba(56,189,248,0.4);
    }

    .header-version {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    /* Metric Cards */
    .metrics-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 12px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: border-color 0.3s ease;
    }

    .card:hover { border-color: var(--border); }

    .card-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-main);
      letter-spacing: -0.5px;
      transition: color 0.4s ease;
    }

    .card-sub {
      font-size: 9px;
      color: var(--text-sub);
      letter-spacing: 0.3px;
    }

    /* CPI Bar */
    .cpi-segments {
      display: flex;
      gap: 2px;
      margin: 2px 0;
    }

    .seg {
      flex: 1;
      height: 5px;
      border-radius: 2px;
      background: var(--bg-panel);
      transition: background 0.5s ease, box-shadow 0.5s ease;
    }

    .seg.s0, .seg.s1 { --seg-color: var(--safe); }
    .seg.s2, .seg.s3 { --seg-color: #84cc16; }
    .seg.s4, .seg.s5 { --seg-color: var(--warn); }
    .seg.s6, .seg.s7 { --seg-color: #f97316; }
    .seg.s8, .seg.s9 { --seg-color: var(--danger); }

    .seg.active {
      background: var(--seg-color);
      box-shadow: 0 0 5px var(--seg-color);
    }

    .cpi-status { font-size: 10px; font-weight: 600; }
    .cpi-status.safe   { color: var(--safe); }
    .cpi-status.warn   { color: var(--warn); }
    .cpi-status.danger { color: var(--danger); }

    .token-num { font-size: 20px; }

    /* Break-Even */
    .section {
      padding: 0 12px 10px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }

    .be-bar-track {
      height: 8px;
      background: var(--bg-panel);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border-dim);
    }

    .be-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #22c55e 0%, #38bdf8 60%, #f59e0b 100%);
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    .be-bar-fill.over {
      background: var(--danger);
      box-shadow: var(--glow-danger);
    }

    .be-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 10px;
      color: var(--text-sub);
    }

    .be-pct {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--accent);
    }

    /* Mode Row */
    .mode-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 10px;
      border-top: 1px solid var(--border-dim);
      border-bottom: 1px solid var(--border-dim);
    }

    .mode-select {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 11px;
      font-family: inherit;
      padding: 5px 8px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .mode-select:focus { border-color: var(--accent); }

    .turn-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-sub);
      white-space: nowrap;
      padding: 5px 8px;
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: 6px;
    }

    .turn-badge.warn-turns { color: var(--warn); border-color: var(--warn); }

    /* TODO Section */
    .todo-section { padding: 8px 12px; }

    .todo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 2px 0;
      margin-bottom: 6px;
    }

    .todo-header:hover .todo-toggle { color: var(--accent); }

    .todo-title {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .todo-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 20px;
      text-align: center;
    }

    .todo-toggle {
      font-size: 10px;
      color: var(--text-dim);
      transition: color 0.2s, transform 0.2s;
    }

    .todo-list {
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .todo-list::-webkit-scrollbar { width: 3px; }
    .todo-list::-webkit-scrollbar-track { background: transparent; }
    .todo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 6px 8px;
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: 6px;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .todo-item:hover { border-color: var(--border); }

    .todo-check {
      width: 14px;
      height: 14px;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .todo-check:hover { border-color: var(--safe); }

    .todo-text {
      flex: 1;
      font-size: 11px;
      color: var(--text-main);
      line-height: 1.4;
      word-break: break-all;
    }

    .todo-del {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 11px;
      transition: color 0.2s, background 0.2s;
    }

    .todo-del:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    .todo-empty {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      padding: 12px;
      font-style: italic;
    }

    /* Handoff Button */
    .handoff-section { padding: 8px 12px 14px; }

    .btn-handoff {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--accent);
      background: linear-gradient(135deg, #0c4a6e, #0369a1);
      color: var(--accent);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-handoff::before {
      content: '';
      position: absolute;
      top: 0; left: -120%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,0.2), transparent);
      animation: shimmer 2.5s linear infinite;
    }

    .btn-handoff:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(56,189,248,0.25);
    }

    .btn-handoff:active { transform: translateY(0); }

    .btn-handoff:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .btn-handoff:disabled::before { animation: none; }

    .btn-feedback {
      text-align: center;
      font-size: 11px;
      margin-top: 6px;
      height: 14px;
      transition: opacity 0.3s;
      color: var(--safe);
    }

    .btn-feedback.error { color: var(--danger); }

    /* No Session State */
    .no-session {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      gap: 8px;
      color: var(--text-dim);
      text-align: center;
      min-height: 200px;
    }

    .no-session-icon { font-size: 28px; opacity: 0.4; }
    .no-session-text { font-size: 12px; line-height: 1.5; }

    /* Animations */
    @keyframes shimmer { to { left: 200%; } }

    @keyframes value-flash {
      0%   { opacity: 0.4; }
      100% { opacity: 1;   }
    }

    .flash-update { animation: value-flash 0.4s ease-out; }

    .divider { height: 1px; background: var(--border-dim); margin: 0; }

    /* Pro Row & Settings Panel */
    .pro-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; border-bottom: 1px solid var(--border-dim);
      cursor: pointer; background: rgba(56,189,248,0.03);
    }
    .pro-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 800;
      letter-spacing: 1px; color: var(--accent);
      background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.3);
      border-radius: 4px; padding: 2px 6px;
    }
    .pro-settings-panel {
      display: none; flex-direction: column; gap: 10px;
      padding: 10px 12px; background: var(--bg-card);
      border-bottom: 1px solid var(--border-dim);
    }
    .pro-settings-panel.open { display: flex; }

    /* Plan buttons */
    .plan-select-row { display: flex; gap: 6px; }
    .plan-btn {
      flex: 1; padding: 6px; border-radius: 6px; font-size: 11px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--border-dim);
      background: var(--bg-panel); color: var(--text-sub); transition: all 0.2s;
    }
    .plan-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* Toggle switch */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-size: 12px; color: var(--text-main); }
    .toggle-switch { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 10px; transition: background 0.3s;
    }
    .toggle-slider::before {
      position: absolute; content: ''; width: 14px; height: 14px;
      left: 2px; bottom: 2px; background: var(--text-dim);
      border-radius: 50%; transition: transform 0.3s, background 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent-dim); border-color: var(--accent); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--accent); }

    /* API key */
    .api-key-row { display: flex; flex-direction: column; gap: 5px; }
    .api-key-input {
      width: 100%; background: var(--bg-panel); border: 1px solid var(--border-dim);
      border-radius: 6px; color: var(--text-main); font-size: 11px;
      font-family: 'JetBrains Mono', monospace; padding: 6px 8px; outline: none;
      transition: border-color 0.2s;
    }
    .api-key-input:focus { border-color: var(--accent); }
    .api-key-actions { display: flex; gap: 5px; }
    .btn-sm {
      flex: 1; padding: 5px 8px; border-radius: 5px; font-size: 10px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg-panel);
      color: var(--text-sub); transition: all 0.2s; font-family: inherit;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.primary { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .api-key-status { font-size: 10px; height: 13px; color: var(--text-dim); }
    .api-key-status.ok  { color: var(--safe); }
    .api-key-status.err { color: var(--danger); }

    /* Density meter (One) */
    .density-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.6s ease, background 0.4s ease;
    }
    .density-bar-fill.green  { background: var(--safe); }
    .density-bar-fill.yellow { background: var(--warn); }
    .density-bar-fill.red    { background: var(--danger); box-shadow: 0 0 6px rgba(239,68,68,0.5); }

    /* Vault (One) */
    .vault-section { padding: 8px 12px 10px; }
    .vault-item {
      background: var(--bg-card); border: 1px solid var(--border-dim);
      border-radius: 6px; padding: 7px 9px; margin-bottom: 5px;
      transition: border-color 0.2s;
    }
    .vault-item:hover { border-color: var(--border); }
    .vault-item.selected { border-color: var(--accent); background: rgba(56,189,248,0.05); }
    .vault-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; gap: 6px; }
    .vault-item-check {
      width: 14px; height: 14px; flex-shrink: 0; cursor: pointer;
      accent-color: var(--accent);
    }
    .vault-item-title {
      flex: 1; font-size: 11px; color: var(--text-main);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .vault-relevance {
      font-size: 9px; font-family: 'JetBrains Mono', monospace;
      color: var(--accent); background: var(--accent-dim);
      border-radius: 4px; padding: 1px 5px; flex-shrink: 0;
    }
    .vault-preview {
      font-size: 10px; color: var(--text-sub);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 5px;
    }
    .vault-use-btn {
      font-size: 10px; padding: 4px 10px; border-radius: 5px;
      border: 1px solid var(--accent); background: var(--accent-dim);
      color: var(--accent); cursor: pointer; font-weight: 600;
      transition: background 0.2s; width: 100%;
    }
    .vault-use-btn:hover { background: rgba(56,189,248,0.2); }

    /* Vault controls */
    .vault-controls { display: flex; flex-direction: column; gap: 7px; margin-top: 8px; }
    .vault-ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .vault-ctrl-label { font-size: 10px; color: var(--text-sub); white-space: nowrap; }
    .density-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px; background: var(--border-dim);
      outline: none; cursor: pointer;
    }
    .density-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: var(--accent);
      border: 2px solid var(--accent-dim); cursor: pointer;
    }
    .density-val-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--accent); background: var(--accent-dim);
      border-radius: 4px; padding: 1px 6px; min-width: 20px; text-align: center;
    }
    .vault-action-row { display: flex; gap: 5px; margin-top: 4px; }
    .btn-vault-inject {
      flex: 2; padding: 7px 8px; border-radius: 6px; font-size: 11px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--accent); background: var(--accent-dim);
      color: var(--accent); transition: background 0.2s; font-family: inherit;
    }
    .btn-vault-inject:hover { background: rgba(56,189,248,0.2); }
    .btn-vault-export {
      flex: 1; padding: 7px 8px; border-radius: 6px; font-size: 10px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg-panel);
      color: var(--text-sub); transition: all 0.2s; font-family: inherit;
    }
    .btn-vault-export:hover { border-color: var(--accent); color: var(--accent); }

    /* Logbook history */
    .history-section { padding: 8px 12px 12px; }
    .history-header {
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; padding: 2px 0; margin-bottom: 6px;
    }
    .history-list { display: none; flex-direction: column; gap: 5px; }
    .history-list.open { display: flex; }
    .history-item {
      background: var(--bg-card); border: 1px solid var(--border-dim);
      border-radius: 6px; padding: 7px 9px; cursor: pointer; transition: border-color 0.2s;
    }
    .history-item:hover { border-color: var(--border); }
    .history-item.expanded .history-full { display: block; }
    .history-ts {
      font-size: 9px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace; margin-bottom: 3px;
    }
    .history-preview {
      font-size: 10px; color: var(--text-sub);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .history-full {
      display: none; font-size: 10px; color: var(--text-sub);
      white-space: pre-wrap; margin-top: 6px; max-height: 120px;
      overflow-y: auto; line-height: 1.4;
    }

    /* Pin Button */
    .pin-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border-dim);
      background: transparent;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .pin-btn:hover { border-color: var(--border); color: var(--text-sub); }
    .pin-btn.pinned {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(56,189,248,0.08);
      box-shadow: 0 0 8px rgba(56,189,248,0.2);
    }
    /* Side Panel Toggle Button */
    .side-btn {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border-dim); background: transparent;
      color: var(--text-sub); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .side-btn:hover {
      border-color: var(--accent); color: var(--accent);
      background: rgba(56,189,248,0.08);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <div class="logo-hex">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2L25 8.5V19.5L14 26L3 19.5V8.5L14 2Z"
                stroke="#38bdf8" stroke-width="1.5" fill="rgba(56,189,248,0.06)"/>
          <text x="9" y="19" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="800">R</text>
        </svg>
      </div>
      <span class="logo-text">RELAY</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="side-btn" id="side-btn" title="Side panel">⬡</button>
      <button class="pin-btn" id="pin-btn" title="Pin">📌</button>
      <select id="lang-select" style="background:var(--bg-panel);border:1px solid var(--border-dim);border-radius:5px;color:var(--text-sub);font-size:10px;padding:3px 4px;cursor:pointer;outline:none;">
        <option value="ja">🇯🇵</option>
        <option value="en">🇺🇸</option>
        <option value="de">🇩🇪</option>
        <option value="fr">🇫🇷</option>
        <option value="ko">🇰🇷</option>
      </select>
    </div>
  </div>

  <!-- Pro Settings Row -->
  <div class="pro-row" id="pro-row">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="pro-badge">PRO</span>
      <span style="font-size:11px;color:var(--text-sub);" id="pro-row-label">設定</span>
    </div>
    <span style="font-size:10px;color:var(--text-dim);" id="pro-row-toggle">▶</span>
  </div>

  <!-- Pro Settings Panel -->
  <div class="pro-settings-panel" id="pro-settings-panel">
    <!-- Plan selection -->
    <div>
      <div class="label" style="margin-bottom:5px;">プラン</div>
      <div class="plan-select-row">
        <button class="plan-btn active" id="plan-btn-free">Free</button>
        <button class="plan-btn" id="plan-btn-pro">Pro $5</button>
        <button class="plan-btn" id="plan-btn-one">One $10</button>
      </div>
    </div>
    <!-- AI Summary toggle (Pro only) -->
    <div class="toggle-row" id="ai-summary-row" style="display:none;">
      <span class="toggle-label">AI要約 (Claude API)</span>
      <label class="toggle-switch">
        <input type="checkbox" id="ai-summary-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <!-- API Key (Pro only) -->
    <div class="api-key-row" id="api-key-row" style="display:none;">
      <div class="label">Claude APIキー</div>
      <input type="password" class="api-key-input" id="api-key-input" placeholder="sk-ant-...">
      <div class="api-key-actions">
        <button class="btn-sm" id="api-key-save">保存</button>
        <button class="btn-sm primary" id="api-key-test">テスト接続</button>
      </div>
      <div class="api-key-status" id="api-key-status"></div>
    </div>
  </div>

  <!-- Main content (visible when session active) -->
  <div id="main-content">

    <!-- Metric Cards -->
    <div class="metrics-row">

      <!-- CPI Card -->
      <div class="card" id="cpi-card">
        <span class="label" data-i18n="cpi">CPI</span>
        <div class="cpi-segments" id="cpi-segments">
          <div class="seg s0" data-idx="0"></div>
          <div class="seg s1" data-idx="1"></div>
          <div class="seg s2" data-idx="2"></div>
          <div class="seg s3" data-idx="3"></div>
          <div class="seg s4" data-idx="4"></div>
          <div class="seg s5" data-idx="5"></div>
          <div class="seg s6" data-idx="6"></div>
          <div class="seg s7" data-idx="7"></div>
          <div class="seg s8" data-idx="8"></div>
          <div class="seg s9" data-idx="9"></div>
        </div>
        <span class="card-value mono" id="cpi-value">—</span>
        <span class="cpi-status safe" id="cpi-status">待機中</span>
      </div>

      <!-- Tokens Card -->
      <div class="card">
        <span class="label" data-i18n="tokens">TOKENS</span>
        <span class="card-value mono token-num" id="token-value">0</span>
        <span class="card-sub">est. accumulated</span>
      </div>

    </div>

    <!-- Density Meter (One) -->
    <div id="density-section" style="display:none;">
      <div class="section" style="padding-bottom:8px;">
        <div class="section-header">
          <span class="label" style="color:var(--accent);">DENSITY [ONE]</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="mono" id="density-status" style="font-size:9px;color:var(--safe);">正常</span>
            <span class="mono" id="density-val" style="font-size:11px;color:var(--accent);">0.00</span>
          </div>
        </div>
        <div class="be-bar-track">
          <div class="density-bar-fill green" id="density-bar" style="width:0%;"></div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:4px;">
          <svg id="density-graph" width="90" height="22" style="overflow:visible;"></svg>
        </div>
      </div>
      <div class="divider"></div>
    </div>

    <!-- Break-Even -->
    <div class="section">
      <div class="section-header">
        <span class="label" data-i18n="breakeven">BREAK-EVEN POINT</span>
        <span class="be-pct mono" id="be-pct">0%</span>
      </div>
      <div class="be-bar-track">
        <div class="be-bar-fill" id="be-bar"></div>
      </div>
      <div class="be-meta">
        <span id="be-margin">推奨切替まで: 計算中</span>
        <span id="be-tstar" class="mono"></span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Mode Row -->
    <div class="mode-row">
      <select class="mode-select" id="mode-select">
        <option value="light" data-i18n="mode_light">軽作業（参照・質問・相談）</option>
        <option value="heavy" selected data-i18n="mode_heavy">重作業（設計・実装・修正）</option>
        <option value="file" data-i18n="mode_file">ファイル多用</option>
      </select>
      <div class="turn-badge mono" id="turn-badge">T: 0</div>
    </div>

    <div class="divider"></div>

    <!-- TODO Section -->
    <div class="todo-section">
      <div class="todo-header" id="todo-header">
        <div class="todo-title">
          <span class="label" data-i18n="todo_label">TODO</span>
          <span class="todo-count" id="todo-count">0</span>
        </div>
        <span class="todo-toggle" id="todo-toggle">▼</span>
      </div>
      <div class="todo-list" id="todo-list">
        <div class="todo-empty">タスクはまだありません</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Handoff Button -->
    <div class="handoff-section">
      <button class="btn-handoff" id="btn-handoff">
        ⚡ <span data-i18n="handoff_label">今すぐ引き継ぎ</span>
      </button>
      <div class="btn-feedback" id="btn-feedback"></div>
    </div>

    <div class="divider" id="history-divider" style="display:none;"></div>

    <!-- Logbook History (Pro) -->
    <div class="history-section" id="history-section" style="display:none;">
      <div class="history-header" id="history-header">
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="label">LOGBOOK履歴</span>
          <span class="todo-count" id="history-count">0</span>
        </div>
        <span class="todo-toggle" id="history-toggle">▶</span>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>

  </div>

  <!-- No session state -->
  <div id="no-session-state" style="display:none;">
    <div class="no-session">
      <div class="no-session-icon">◎</div>
      <div class="no-session-text">
        <span data-i18n="no_session">Claude.ai でチャットを開いてください</span><br>
        <span style="color: #334155; font-size: 10px;" data-i18n="no_session_sub">Relay が自動的に計測を開始します</span>
      </div>
    </div>
    <!-- Vault (One) -->
    <div class="vault-section" id="vault-section" style="display:none;">
      <div class="divider" style="margin-bottom:10px;"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span class="label" style="color:var(--accent);">VAULT [ONE]</span>
        <span class="todo-count" id="vault-count">0</span>
      </div>
      <div id="vault-list"></div>
      <!-- Vault Controls -->
      <div class="vault-controls">
        <!-- Density slider -->
        <div class="vault-ctrl-row">
          <span class="vault-ctrl-label">注入密度</span>
          <input type="range" class="density-slider" id="vault-density-slider" min="1" max="5" value="3">
          <span class="density-val-badge" id="vault-density-val">3</span>
        </div>
        <!-- Auto-inject toggle -->
        <div class="vault-ctrl-row">
          <span class="vault-ctrl-label">新規チャットで自動注入</span>
          <label class="toggle-switch">
            <input type="checkbox" id="vault-auto-inject">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <!-- Action buttons -->
        <div class="vault-action-row">
          <button class="btn-vault-inject" id="btn-vault-inject">⚡ 選択してnew chatに注入</button>
          <button class="btn-vault-export" id="btn-vault-export">📥 Export</button>
        </div>
      </div>
    </div>
    <!-- Still show handoff button for manual use -->
    <div class="handoff-section">
      <button class="btn-handoff" id="btn-handoff-alt">
        ⚡ 今すぐ引き継ぎ
      </button>
      <div class="btn-feedback" id="btn-feedback-alt"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
