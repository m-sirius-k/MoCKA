<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 420px;
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: #1a1a2e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a3e;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: #7c83ff;
      letter-spacing: 0.5px;
    }
    .turn-badge {
      background: #2a2a3e;
      border: 1px solid #3a3a5e;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: #a0a0c0;
    }
    .turn-badge.warn {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a3e;
    }
    .tab {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      cursor: pointer;
      color: #6a6a8a;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab:hover { color: #a0a0c0; }
    .tab.active {
      color: #7c83ff;
      border-bottom-color: #7c83ff;
    }
    .tab-count {
      display: inline-block;
      background: #2a2a3e;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 10px;
      margin-left: 4px;
      color: #8080a0;
    }
    .tab.active .tab-count {
      background: #3a3aff30;
      color: #7c83ff;
    }

    /* Panel */
    .panel { display: none; padding: 12px; max-height: 360px; overflow-y: auto; }
    .panel.active { display: block; }

    /* Empty state */
    .empty {
      text-align: center;
      color: #4a4a6a;
      padding: 40px 20px;
      line-height: 1.6;
    }
    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    /* TODO item */
    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 10px;
      margin-bottom: 6px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 7px;
      transition: border-color .15s;
    }
    .todo-item:hover { border-color: #4a4a7e; }

    .todo-check {
      width: 16px;
      height: 16px;
      border: 2px solid #4a4a7e;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .todo-check:hover {
      border-color: #7c83ff;
      background: #7c83ff20;
    }

    .todo-body { flex: 1; min-width: 0; }
    .todo-text {
      line-height: 1.4;
      word-break: break-word;
      color: #d0d0e8;
    }
    .todo-meta {
      font-size: 10px;
      color: #5a5a7a;
      margin-top: 3px;
    }
    .source-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
      margin-right: 4px;
    }
    .source-badge.assistant { background: #1e3a5f; color: #5aabff; }
    .source-badge.user { background: #3a1e5f; color: #b06aff; }

    .todo-del {
      background: none;
      border: none;
      color: #4a4a6a;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }
    .todo-del:hover { color: #ff6b6b; }

    /* LOG item */
    .log-item {
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-left: 3px solid #2ecc71;
      border-radius: 7px;
    }
    .log-text {
      color: #c0c0d8;
      line-height: 1.4;
      word-break: break-word;
      margin-bottom: 6px;
    }
    .log-5w1h {
      font-size: 11px;
      color: #5a5a7a;
      line-height: 1.6;
      border-top: 1px solid #2a2a3e;
      padding-top: 6px;
      margin-top: 4px;
    }
    .log-5w1h span { color: #7c83ff; margin-right: 4px; }

    /* Clear button */
    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 7px;
      background: none;
      border: 1px solid #3a3a5e;
      border-radius: 6px;
      color: #5a5a7a;
      cursor: pointer;
      font-size: 12px;
    }
    .clear-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

    /* Scrollbar */
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">⚡ Relay</div>
    <div class="turn-badge" id="turn-badge">0 / 20 turns</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="todo">
      TODO <span class="tab-count" id="todo-count">0</span>
    </div>
    <div class="tab" data-tab="log">
      LOG <span class="tab-count" id="log-count">0</span>
    </div>
  </div>

  <!-- TODO Panel -->
  <div class="panel active" id="panel-todo">
    <div class="empty" id="todo-empty">
      <div class="empty-icon">📋</div>
      <div>No TODOs yet.</div>
      <div style="font-size:11px;margin-top:6px;color:#3a3a5a">
        Say "Please do X" or "Make sure to Y"<br>and Relay will pick it up.
      </div>
    </div>
    <div id="todo-list"></div>
  </div>

  <!-- LOG Panel -->
  <div class="panel" id="panel-log">
    <div class="empty" id="log-empty">
      <div class="empty-icon">📖</div>
      <div>No completed TODOs yet.</div>
      <div style="font-size:11px;margin-top:6px;color:#3a3a5a">
        Check off a TODO and it will appear here.
      </div>
    </div>
    <div id="log-list"></div>
    <button class="clear-btn" id="clear-log-btn">Clear log</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
