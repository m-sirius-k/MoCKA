name: PHI-OS Regression CI

# PHI-OS (Relay v4.1.0) — Proof of Reproducibility
# docker compose run reproduce-phios → VERIFIED (L4)
# ubuntu / macos / windows マトリクス

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:        # 手動実行ボタン

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job: docker compose run reproduce-phios  (3 OS マトリクス)
  # ─────────────────────────────────────────────────────────────────────────────
  reproduce-docker:
    name: reproduce-phios (${{ matrix.os }})
    strategy:
      fail-fast: false      # 1つ失敗しても他OS継続
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. macOS: Docker未インストール → colima でデーモン起動 ────────────
      - name: Setup Docker via colima (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install colima docker docker-buildx docker-compose
          # docker-compose プラグインをCLIに登録
          mkdir -p ~/.docker/cli-plugins
          ln -sfn "$(brew --prefix)/opt/docker-compose/bin/docker-compose" \
            ~/.docker/cli-plugins/docker-compose
          # colimaでLinuxコンテナ用デーモン起動
          colima start \
            --cpu 2 \
            --memory 4 \
            --disk 60 \
            --wait
          docker context use colima

      # ── 3. Windows: Docker Desktop プリインストール済み確認 ───────────────
      #   windows-latest は WSL2 バックエンドで Linux コンテナが動作する
      - name: Verify Docker daemon
        run: docker info

      # ── 4. Docker イメージビルド ──────────────────────────────────────────
      - name: Build image
        run: docker compose build reproduce-phios

      # ── 5. MAIN: reproduce-phios 実行 → VERIFIED ─────────────────────────
      #   exit 0 = VERIFIED (L4)
      #   exit 1 = FAIL
      - name: Run → VERIFIED
        run: docker compose run --rm reproduce-phios

      # ── 6. VERIFIED 文字列を明示確認 (ログに残す) ────────────────────────
      - name: Confirm VERIFIED in output
        shell: bash
        run: |
          RESULT="reproduce_output/PHIOS_REPRODUCE_RESULT.md"
          if [ -f "$RESULT" ]; then
            echo "=== PHIOS_REPRODUCE_RESULT.md ==="
            grep -E "VERIFIED|PASS|FAIL|SKIP|Hash" "$RESULT" || true
          else
            echo "Result file not found (exit code is the source of truth)"
          fi

      # ── 7. アーティファクト: 試験結果レポートをアップロード ──────────────
      - name: Upload PHIOS_REPRODUCE_RESULT
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phios-result-${{ matrix.os }}
          path: reproduce_output/PHIOS_REPRODUCE_RESULT.md
          retention-days: 30

      # ── 8. macOS クリーンアップ ───────────────────────────────────────────
      - name: Colima stop (macOS)
        if: runner.os == 'macOS' && always()
        run: colima stop || true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job: 全OS通過後にサマリーを出力
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Summary
    needs: reproduce-docker
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print result
        run: |
          echo "=================================================="
          echo "  PHI-OS Regression CI — Result Summary"
          echo "=================================================="
          echo "  Job status: ${{ needs.reproduce-docker.result }}"
          if [ "${{ needs.reproduce-docker.result }}" = "success" ]; then
            echo "  ✅ ALL OS: PHI-OS Proof of Reproducibility VERIFIED (L4)"
          else
            echo "  ❌ FAIL: 一部またはすべてのOSで失敗しました"
          fi
          echo "=================================================="
