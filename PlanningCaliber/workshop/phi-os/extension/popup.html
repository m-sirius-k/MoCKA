<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PHI OS</title>
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 14px 16px;
      background: #0f1623;
      color: #e2e8f0;
      font-family: sans-serif;
      font-size: 13px;
    }
    h2 { margin: 0 0 10px; font-size: 14px; color: #90cdf4; letter-spacing: 0.05em; }
    .row { display: flex; justify-content: space-between; margin-bottom: 6px; color: #a0aec0; }
    .val { color: #e2e8f0; }
    hr { border: none; border-top: 1px solid #2d3748; margin: 10px 0; }
    button {
      width: 100%;
      padding: 7px;
      background: #1e2d40;
      color: #90cdf4;
      border: 1px solid #2d4a6e;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 5px;
    }
    button:hover { background: #2a3f5a; }
    #status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #68d391;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <h2><span id="status-dot"></span>PHI OS</h2>
  <div class="row"><span>コミット数</span><span class="val" id="commit-count">-</span></div>
  <div class="row"><span>最終保存</span><span class="val" id="last-commit">-</span></div>
  <hr>
  <button id="btn-debug">🔍 Debug Panel (Shift+Alt+P)</button>
  <button id="btn-clear">🗑 古いデータを削除</button>
  <script>
    // ステータス取得
    chrome.runtime.sendMessage({ type: 'PHI_GET_STATUS' }, (res) => {
      if (res && !res.error) {
        document.getElementById('commit-count').textContent = res.commit_count;
        document.getElementById('last-commit').textContent = res.last_commit_ts
          ? new Date(res.last_commit_ts).toLocaleString()
          : 'なし';
      }
    });

    // Debugトグル
    document.getElementById('btn-debug').onclick = () => {
      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        if (tabs[0]) chrome.tabs.sendMessage(tabs[0].id, { type: 'PHI_DEBUG_TOGGLE' });
      });
    };

    // 古いデータ削除
    document.getElementById('btn-clear').onclick = () => {
      chrome.runtime.sendMessage({ type: 'PHI_CLEAR_OLD_DATA' }, (res) => {
        if (res && res.ok) alert(`削除完了: ${res.deleted}件`);
      });
    };
  </script>
</body>
</html>
