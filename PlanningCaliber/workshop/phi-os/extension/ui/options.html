<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHI OS — Dashboard</title>
<link rel="stylesheet" href="options.css">
</head>
<body>
<div id="app">

  <!-- ヘッダー -->
  <header class="phi-header">
    <div class="phi-logo">Φ PHI OS</div>
    <div class="phi-header-right">
      <select id="lang-select" title="Language">
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="es">🇪🇸 Español</option>
      </select>
    </div>
  </header>

  <!-- ステータスバー -->
  <section class="phi-section">
    <h2 data-i18n="label_facts">ステータス</h2>
    <div class="status-grid">
      <div class="status-card" id="card-mode">
        <div class="status-label">Mode</div>
        <div class="status-value" id="mode-value">—</div>
      </div>
      <div class="status-card" id="card-relay">
        <div class="status-label">Relay</div>
        <div class="status-dot" id="dot-relay"></div>
      </div>
      <div class="status-card" id="card-orchestra">
        <div class="status-label">Orchestra</div>
        <div class="status-dot" id="dot-orchestra"></div>
      </div>
      <div class="status-card" id="card-memory">
        <div class="status-label">Memory</div>
        <div class="status-dot" id="dot-memory"></div>
      </div>
      <div class="status-card" id="card-mocka">
        <div class="status-label">MoCKA</div>
        <div class="status-dot" id="dot-mocka"></div>
      </div>
    </div>
  </section>

  <!-- ストレージ使用量 -->
  <section class="phi-section">
    <h2>Storage</h2>
    <div class="storage-bar-wrap">
      <div class="storage-bar"><div class="storage-fill" id="storage-fill"></div></div>
      <span id="storage-text">— / 5 MB</span>
    </div>
  </section>

  <!-- コミット履歴 -->
  <section class="phi-section">
    <h2><span data-i18n="label_decisions">コミット履歴</span></h2>
    <div id="commit-list" class="commit-list">
      <div class="empty">まだコミットがありません</div>
    </div>
  </section>

  <!-- アクションボタン -->
  <section class="phi-section phi-actions">
    <button id="btn-commit"  class="phi-btn primary" data-i18n="btn_commit">セッションを保存</button>
    <button id="btn-restore" class="phi-btn"         data-i18n="btn_restore">前回を復元</button>
    <button id="btn-export"  class="phi-btn"         data-i18n="btn_export">エクスポート</button>
    <button id="btn-panel"   class="phi-btn"         data-i18n="btn_toggle_panel">パネル切り換え</button>
  </section>

  <!-- Connected Mode 設定 -->
  <section class="phi-section">
    <h2>Connected Mode</h2>
    <label class="phi-toggle">
      <input type="checkbox" id="toggle-connected">
      <span class="phi-toggle-slider"></span>
      <span class="phi-toggle-label">MoCKA localhost:5000 接続を許可</span>
    </label>
    <p class="phi-note">
      chrome.ai/new でセッション文脈を自動復元します。
      Standalone Modeではサーバー接続ゼロで動作します。
    </p>
  </section>

  <!-- Restore Packet 注入設定 -->
  <section class="phi-section">
    <h2>Restore</h2>
    <label class="phi-toggle">
      <input type="checkbox" id="toggle-restore" checked>
      <span class="phi-toggle-slider"></span>
      <span class="phi-toggle-label">claude.ai/new を開いたとき自動で文脈を注入する</span>
    </label>
  </section>

  <!-- マニュアル -->
  <section class="phi-section" id="manual-section">
    <h2 data-i18n="btn_manual">マニュアル</h2>
    <div id="manual-content" class="manual-content">
      <!-- options.js が動的に生成 -->
    </div>
  </section>

  <!-- デバッグ -->
  <section class="phi-section">
    <h2>Debug</h2>
    <button id="btn-health"    class="phi-btn small">Health Check</button>
    <button id="btn-clear-log" class="phi-btn small danger">エラーログをクリア</button>
    <pre id="health-result" class="phi-pre"></pre>
  </section>

  <!-- ステータスメッセージ -->
  <div id="toast" class="phi-toast hidden"></div>

</div>
<script src="options.js" type="module"></script>
</body>
</html>
