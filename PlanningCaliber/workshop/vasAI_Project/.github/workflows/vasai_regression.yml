name: vasAI Regression CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  regression:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Core Freeze
        run: python core_freeze.py verify
        env:
          VASAI_HMAC_KEY: ci-test-key-do-not-use-in-prod
          PYTHONIOENCODING: utf-8

      - name: Run pytest (unit tests)
        run: python -m pytest tests/ -v --tb=short
        env:
          VASAI_HMAC_KEY: ci-test-key-do-not-use-in-prod
          PYTHONIOENCODING: utf-8

      - name: Run reproduction (reproduce_l48.py)
        run: python reproduce_l48.py
        env:
          VASAI_HMAC_KEY: ci-test-key-do-not-use-in-prod
          PYTHONIOENCODING: utf-8

      - name: Check PASS rate
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          p = Path('test_field/reports/last_run.json')
          if not p.exists():
              print('last_run.json not found')
              sys.exit(1)
          r = json.loads(p.read_text())
          total = r['total']
          passed = r['passed']
          failed = r['failed']
          print(f'vasAI Regression: {passed}/{total} PASS')
          if failed > 0:
              print(f'REGRESSION DETECTED: {failed} failure(s)')
              for d in r.get('details', []):
                  if not d.get('success'):
                      print(f'  FAIL: {d[\"id\"]} {d[\"name\"]}')
              sys.exit(1)
          print('All scenarios PASS - L4.9 Proof of Reproducibility: VERIFIED')
          "
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload reproduce result
        uses: actions/upload-artifact@v4
        with:
          name: reproduce-result-${{ matrix.os }}-py${{ matrix.python }}
          path: REPRODUCE_RESULT.md

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vasai-test-reports-${{ matrix.os }}
          path: test_field/reports/
          retention-days: 30
