<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380">
  <title>Memory</title>
  <style>
    :root {
      --bg-primary:    #0f0f11;
      --bg-secondary:  #1a1a1f;
      --bg-card:       #22222a;
      --accent:        #7c6aff;
      --accent-soft:   #4a3fa0;
      --success:       #3ddc84;
      --warning:       #f5a623;
      --danger:        #ff4d4d;
      --text-primary:  #f0f0f5;
      --text-secondary:#9090a8;
      --text-muted:    #505068;
      --border:        #2a2a35;
      --radius-sm:     6px;
      --radius-md:     10px;
      --radius-lg:     16px;
      --font:          'Inter', -apple-system, sans-serif;
      --popup-width:   380px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: var(--popup-width);
      min-height: 480px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .title-block h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .title-block span {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .plan-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
    }

    .tabs {
      display: flex;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 9px 4px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab:hover:not(.active) {
      color: var(--text-secondary);
    }

    .content {
      padding: 12px;
      max-height: 360px;
      overflow-y: auto;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-count {
      font-size: 11px;
      color: var(--text-muted);
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .file-item:last-child { border-bottom: none; }

    .file-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-stable   { background: var(--success); }
    .status-modified { background: var(--warning); }
    .status-broken   { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .status-unknown  { background: var(--text-muted); }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-path {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-summary {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .error-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .error-item:last-child { border-bottom: none; }

    .error-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .severity-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
    }

    .severity-critical { background: #ff4d4d22; color: var(--danger); }
    .severity-warning  { background: #f5a62322; color: var(--warning); }
    .severity-info     { background: #7c6aff22; color: var(--accent); }

    .error-pattern {
      font-size: 12px;
      color: var(--text-primary);
    }

    .error-count {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .error-solution {
      font-size: 10px;
      color: var(--text-secondary);
      padding-left: 4px;
      border-left: 2px solid var(--accent-soft);
      margin-top: 3px;
    }

    .env-item, .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 0;
      font-size: 12px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .env-item:last-child, .todo-item:last-child { border-bottom: none; }

    .env-bullet { color: var(--accent); flex-shrink: 0; }

    .footer {
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: #6858e0; }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { color: var(--text-primary); border-color: var(--accent); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .empty {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    .locked {
      position: relative;
      pointer-events: none;
      opacity: 0.4;
    }

    .lock-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15,15,17,0.7);
      border-radius: var(--radius-md);
      pointer-events: all;
    }

    .lock-msg {
      font-size: 12px;
      color: var(--accent);
      text-align: center;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 9999;
    }

    .toast.show { opacity: 1; }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo">🧠</div>
      <div class="title-block">
        <h1 id="title-text">Memory</h1>
        <span id="subtitle-text">AI remembers your work</span>
      </div>
    </div>
    <span class="plan-badge" id="plan-badge">FREE</span>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="files"    id="tab-files">📁 Files</div>
    <div class="tab"        data-tab="errors"   id="tab-errors">🔴 Errors</div>
    <div class="tab"        data-tab="env"      id="tab-env">⚙️ Env</div>
    <div class="tab"        data-tab="settings" id="tab-settings">⚙</div>
  </div>

  <div class="content">

    <div class="panel active" id="panel-files">
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="label-files">Work Files</span>
          <span class="card-count" id="files-count">0 files</span>
        </div>
        <div id="files-list">
          <div class="empty">
            <div class="empty-icon">📁</div>
            <span id="label-no-files">No files recorded</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title" id="label-todos">Pending TODOs</span>
        </div>
        <div id="todos-list">
          <div class="empty"><span>—</span></div>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-errors">
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="label-errors">Known Errors</span>
          <span class="card-count" id="errors-count">0</span>
        </div>
        <div id="errors-list">
          <div class="empty">
            <div class="empty-icon">✅</div>
            <span id="label-no-errors">No errors recorded</span>
          </div>
        </div>
      </div>

      <div class="card" id="decisions-card">
        <div class="card-header">
          <span class="card-title" id="label-decisions">Decisions</span>
        </div>
        <div id="decisions-list"></div>
      </div>
    </div>

    <div class="panel" id="panel-env">
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="label-environment">Environment</span>
        </div>
        <div id="env-list">
          <div class="empty"><span>—</span></div>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-settings">
      <div class="card">
        <div class="card-header">
          <span class="card-title">License</span>
        </div>
        <div style="padding: 8px 0;">
          <input id="license-input" type="text"
            placeholder="MEM-P-XXXX or MEM-O-XXXX"
            style="width:100%; padding:7px 10px; background:var(--bg-secondary);
                   border:1px solid var(--border); border-radius:var(--radius-sm);
                   color:var(--text-primary); font-size:12px;">
          <button id="license-apply" class="btn btn-primary"
            style="width:100%; margin-top:6px;">Apply</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Workspace</span>
        </div>
        <div id="workspace-info" style="font-size:11px; color:var(--text-secondary); padding:4px 0;"></div>
      </div>
    </div>

  </div>

  <div class="footer">
    <button class="btn btn-primary" id="btn-copy">📋 Copy for next chat</button>
    <button class="btn btn-secondary" id="btn-clear">Clear</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
