<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEO-OS</title>
<link rel="stylesheet" href="styles/popup.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="logo">⚡ SEO-OS</span>
    <span class="version">Command Center</span>
  </div>
  <div id="server-status" class="status-dot offline"
       title="サーバー状態"></div>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stat">
    <span id="cnt-pending" class="stat-num yellow">-</span>
    <span class="stat-label">承認待ち</span>
  </div>
  <div class="stat">
    <span id="cnt-running" class="stat-num blue">-</span>
    <span class="stat-label">実行中</span>
  </div>
  <div class="stat">
    <span id="cnt-done" class="stat-num green">-</span>
    <span class="stat-label">完了</span>
  </div>
  <div class="stat">
    <span id="cnt-failed" class="stat-num red">-</span>
    <span class="stat-label">失敗</span>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="setTab('pending')"
          id="tab-pending">承認待ち</button>
  <button class="tab" onclick="setTab('approved')"
          id="tab-approved">承認済み</button>
  <button class="tab" onclick="setTab('done')"
          id="tab-done">完了</button>
</div>

<!-- Job List -->
<div id="job-list" class="job-list"></div>

<!-- New Job Button -->
<div class="footer">
  <button class="btn-new" onclick="showNewJob()">
    ＋ NEW JOB
  </button>
  <button class="btn-open" onclick="openDashboard()">
    🖥 フル画面
  </button>
</div>

<!-- New Job Form -->
<div id="new-job-form" class="new-job-form hidden">
  <div class="form-title">新規 Job</div>
  <input id="f-title" class="f-input"
         placeholder="タイトル（例: Orchestra LP公開）">
  <select id="f-type" class="f-input">
    <option value="lp">LP公開</option>
    <option value="blog">ブログ記事</option>
    <option value="bot">BOT投稿</option>
    <option value="important">重要案件</option>
  </select>
  <input id="f-target" class="f-input"
         placeholder="投稿先（wordpress / sftp / x）">
  <select id="f-pipeline" class="f-input">
    <option value="lp_pipeline">LP Pipeline</option>
    <option value="blog_pipeline">Blog Pipeline</option>
    <option value="bot_pipeline">Bot Pipeline</option>
  </select>
  <select id="f-ai" class="f-input">
    <option value="0">博士起草（要承認）</option>
    <option value="1">AI生成（Policy自動判定）</option>
  </select>
  <textarea id="f-note" class="f-input f-textarea"
            placeholder="メモ・補足"></textarea>
  <div class="form-btns">
    <button class="btn-submit" onclick="submitJob()">
      作成
    </button>
    <button class="btn-cancel" onclick="hideNewJob()">
      キャンセル
    </button>
  </div>
</div>

<!-- Reject Modal -->
<div id="reject-modal" class="modal hidden">
  <div class="modal-title">却下理由</div>
  <textarea id="reject-reason" class="f-input f-textarea"
            placeholder="却下理由を入力"></textarea>
  <div class="form-btns">
    <button class="btn-reject-confirm"
            onclick="submitReject()">却下する</button>
    <button class="btn-cancel"
            onclick="hideReject()">キャンセル</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
