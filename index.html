<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>MoCKA Command Center</title>
    <style>
        body { background:#000; color:#fff; font-family:monospace; padding:20px; overflow-x:hidden; }
        .block { border:1px solid #0f0; padding:15px; margin-bottom:15px; background: rgba(0,20,0,0.5); }
        h3 { color: #0f0; margin-top: 0; border-bottom: 1px solid #0f0; padding-bottom: 5px; font-size:14px; }
        button { background:transparent; color:#fff; border:1px solid #fff; padding:10px 15px; cursor:pointer; margin:5px; font-family:monospace; transition: 0.2s; }
        button:hover { background: #0f0; color: #000; }
        .active { background-color: #0f0 !important; color: #000 !important; font-weight: bold; box-shadow: 0 0 10px #0f0; }
        #exec { width:100%; padding:20px; border:2px solid #500; color:#555; background:#222; font-size:20px; font-weight:bold; transition: 0.3s; }
        #exec.ready { border-color:#0f0; background:#040; color:#fff; cursor:pointer; box-shadow: 0 0 20px #0f0; }
        .history-container { margin-top: 10px; max-height: 250px; overflow-y: auto; border: 1px solid #333; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        th { background: #111; color: #0f0; position: sticky; top: 0; padding: 10px; text-align: left; }
        td { border-bottom: 1px solid #222; padding: 8px; color: #ccc; }
        .opt-group { display:none; margin-top:10px; padding: 10px; border: 1px dashed #0f0; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    </style>
</head>
<body>
    <div class="block">
        <h3>1. SELECT CATEGORY</h3>
        <button id="btnA" onclick="setCat('A', this)">A: 保存 (Storage)</button>
        <button id="btnB" onclick="setCat('B', this)">B: 共有 (Broadcast)</button>
    </div>

    <div id="opt-A" class="opt-group">
        <h3>TARGET: STORAGE (保存先選択)</h3>
        <button class="s-btn" onclick="toggleT('infield', this)">infield</button>
        <button class="s-btn" onclick="toggleT('outfield', this)">outfield</button>
        <button class="s-btn" onclick="toggleT('公文書', this)">公文書</button>
        <button class="s-btn" onclick="toggleT('インシデント', this)">インシデント</button>
        <button class="s-btn" onclick="toggleT('クレーム', this)">クレーム</button>
    </div>

    <div id="opt-B" class="opt-group">
        <h3>TARGET: AI AGENTS (共有先選択)</h3>
        <button onclick="toggleAll(this)" style="border-color: yellow; color: yellow;">⚡ 全員一斉選択</button>
        <div style="margin-top:10px;">
            <button class="s-btn" onclick="toggleT('ChatGPT', this)">ChatGPT</button>
            <button class="s-btn" onclick="toggleT('Gemini', this)">Gemini</button>
            <button class="s-btn" onclick="toggleT('Claude', this)">Claude</button>
            <button class="s-btn" onclick="toggleT('Perplexity', this)">Perplexity</button>
            <button class="s-btn" onclick="toggleT('Copilot', this)">Copilot</button>
        </div>
    </div>

    <button id="exec" onclick="fire()">SELECT MISSION TARGETS</button>

    <div class="block">
        <h3>MISSION LOG (HISTORY)</h3>
        <div class="history-container">
            <table><thead><tr><th>日時</th><th>対象</th><th>内容</th></tr></thead>
            <tbody id="history-body"></tbody></table>
        </div>
    </div>

    <script>
        let state = {c:null, targets:[]};
        window.onload = () => { updateHistory(); };

        function setCat(c, el) {
            state.c = c; state.targets = [];
            document.querySelectorAll('#btnA, #btnB').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('opt-A').style.display = (c === 'A') ? 'block' : 'none';
            document.getElementById('opt-B').style.display = (c === 'B') ? 'block' : 'none';
            updateBtn();
        }

        function toggleT(t, el) {
            el.classList.toggle('active');
            if(state.targets.includes(t)) state.targets = state.targets.filter(x => x !== t);
            else state.targets.push(t);
            updateBtn();
        }

        function toggleAll(el) {
            el.classList.toggle('active');
            const ais = ['ChatGPT','Gemini','Claude','Perplexity','Copilot'];
            const isActive = el.classList.contains('active');
            state.targets = isActive ? [...ais] : [];
            document.querySelectorAll('#opt-B .s-btn').forEach(b => {
                if(isActive) b.classList.add('active'); else b.classList.remove('active');
            });
            updateBtn();
        }

        function updateBtn() {
            const b = document.getElementById('exec');
            if(state.targets.length > 0) {
                b.classList.add('ready');
                b.innerText = "LAUNCH: " + state.targets.join(' & ');
            } else {
                b.classList.remove('ready');
                b.innerText = "SELECT MISSION TARGETS";
            }
        }

        async function fire() {
            if(!state.c || state.targets.length === 0) return;
            const btn = document.getElementById('exec');
            const originalText = btn.innerText;
            btn.innerText = "DISPATCHING...";
            for(const t of state.targets) {
                await fetch('/ask', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({c:state.c, o:t})
                });
            }
            btn.innerText = "MISSION COMPLETE";
            updateHistory();
            setTimeout(() => { updateBtn(); }, 2000);
        }

        async function updateHistory() {
            try {
                const res = await fetch('/get_history');
                const data = await res.json();
                const body = document.getElementById('history-body');
                body.innerHTML = "";
                data.reverse().forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${row.日付}</td><td>${row.名称}</td><td>${row.簡単な内容}</td>`;
                    body.appendChild(tr);
                });
            } catch(e) { console.error("History failed", e); }
        }
    </script>
</body>
</html>
