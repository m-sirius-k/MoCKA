<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="monospace" font-size="14">
  <rect x="0" y="0" width="900" height="480" fill="#ffffff" stroke="none"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold">Phase10-3 Topology Freeze v1.0 (static reference, not a live diagram)</text>

  <!-- O0 track column -->
  <rect x="40" y="60" width="330" height="220" fill="none" stroke="#333333" stroke-width="1.5"/>
  <text x="205" y="82" text-anchor="middle" font-weight="bold">O0 track (observation)</text>

  <rect x="70" y="110" width="270" height="60" fill="#eef3ff" stroke="#2255aa" stroke-width="1.5"/>
  <text x="205" y="135" text-anchor="middle" font-weight="bold">O0-&#916;L</text>
  <text x="205" y="155" text-anchor="middle">role: evaluation</text>

  <line x1="205" y1="170" x2="205" y2="205" stroke="#2255aa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="70" y="205" width="270" height="60" fill="#eef3ff" stroke="#2255aa" stroke-width="1.5"/>
  <text x="205" y="230" text-anchor="middle" font-weight="bold">O0-Human Gate</text>
  <text x="205" y="250" text-anchor="middle">output: closure_tag</text>

  <!-- A6 track column -->
  <rect x="530" y="60" width="330" height="220" fill="none" stroke="#333333" stroke-width="1.5"/>
  <text x="695" y="82" text-anchor="middle" font-weight="bold">A6 track (institutional, FROZEN)</text>

  <rect x="660" y="0" width="0" height="0"/>
  <rect x="595" y="120" width="200" height="40" fill="none" stroke="#777777" stroke-dasharray="4,3"/>
  <text x="695" y="144" text-anchor="middle" font-size="12" fill="#555555">Phase10-3/10-4 logic (black box)</text>

  <rect x="560" y="190" width="270" height="60" fill="#fff1ee" stroke="#aa3322" stroke-width="1.5"/>
  <text x="695" y="215" text-anchor="middle" font-weight="bold">A6 Human Gate</text>
  <text x="695" y="235" text-anchor="middle">output: decision</text>

  <!-- Non-connection indicator between columns -->
  <line x1="370" y1="170" x2="530" y2="170" stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="450" y="160" text-anchor="middle" font-size="12" fill="#aa2222">no connection (forbidden)</text>
  <text x="450" y="185" text-anchor="middle" font-size="20" fill="#aa2222">&#10060;</text>

  <!-- SNAP / A7 isolated area -->
  <rect x="40" y="320" width="820" height="120" fill="none" stroke="#333333" stroke-width="1.5" stroke-dasharray="2,3"/>
  <text x="450" y="342" text-anchor="middle" font-weight="bold">isolated region (no edges to/from O0 or A6 tracks)</text>

  <rect x="100" y="365" width="280" height="55" fill="#f5f5f5" stroke="#666666" stroke-width="1.5"/>
  <text x="240" y="390" text-anchor="middle" font-weight="bold">SNAP</text>
  <text x="240" y="408" text-anchor="middle" font-size="12">external system events only</text>

  <rect x="520" y="365" width="280" height="55" fill="#f5f5f5" stroke="#666666" stroke-width="1.5"/>
  <text x="660" y="390" text-anchor="middle" font-weight="bold">A7</text>
  <text x="660" y="408" text-anchor="middle" font-size="12">inactive trigger domain</text>

  <!-- footer -->
  <text x="450" y="465" text-anchor="middle" font-size="11" fill="#666666">Reference only. Lines denote reference direction, not control or semantic flow. No node, edge, or label may be altered without revisiting phase10_3_integrated_mapping_v3.md.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2255aa"/>
    </marker>
  </defs>
</svg>
