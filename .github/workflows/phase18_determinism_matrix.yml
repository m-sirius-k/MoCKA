@'
name: phase18-determinism-matrix

on:
  push:
    branches: [ main, v4-release ]
  pull_request:

jobs:
  determinism:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Show Environment
      run: |
        python --version
        python -c "import platform; print(platform.platform())"

    - name: Verify Determinism (Canonical)
      run: python verify_chain.py
'@ | Set-Content -Encoding UTF8 phase18_determinism_matrix.yml