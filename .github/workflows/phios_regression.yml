name: PHI-OS Regression CI

# PHI-OS v1.0.0 (Persistent History Interface)
# docker compose run reproduce-phios → VERIFIED (L4)
# ubuntu / macos / windows マトリクス
#
# phi-os実装場所: PlanningCaliber/workshop/phi-os/

on:
  push:
    branches: ["main", "master"]
    paths:
      - "PlanningCaliber/workshop/phi-os/**"
      - ".github/workflows/phios_regression.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "PlanningCaliber/workshop/phi-os/**"
      - ".github/workflows/phios_regression.yml"
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"
  PHIOS_DIR: PlanningCaliber/workshop/phi-os

jobs:
  # ── Ubuntu: Docker (Linux コンテナ) ─────────────────────────────────────────
  reproduce-docker:
    name: reproduce-phios / Docker (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker daemon
        run: docker info

      - name: Build image
        working-directory: ${{ env.PHIOS_DIR }}
        run: docker compose build reproduce-phios

      - name: Run → VERIFIED
        working-directory: ${{ env.PHIOS_DIR }}
        run: docker compose run --rm reproduce-phios

      - name: Confirm VERIFIED in result
        run: |
          RESULT="${{ env.PHIOS_DIR }}/reproduce_output/PHIOS_REPRODUCE_RESULT.md"
          if [ -f "$RESULT" ]; then
            grep -E "VERIFIED|L4|PASS|FAIL|SKIP|Hash" "$RESULT" | head -10
          fi

      - name: Upload result (ubuntu)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phios-result-ubuntu
          path: ${{ env.PHIOS_DIR }}/reproduce_output/PHIOS_REPRODUCE_RESULT.md
          retention-days: 30

  # ── macOS / Windows: Native Python + Puppeteer ───────────────────────────────
  # Docker on macOS/Windows GitHub runners は不安定のため Native 実行
  # (macOS: Docker未搭載, Windows: Linuxコンテナモード切替が信頼性低い)
  reproduce-native:
    name: reproduce-phios / Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Puppeteer が自身のChromiumをダウンロード（macOS/Windows用）
      - name: Install npm deps (Puppeteer + Chromium)
        working-directory: ${{ env.PHIOS_DIR }}/test
        run: npm install --no-audit --no-fund

      - name: Run reproduce_phios.py → VERIFIED
        working-directory: ${{ env.PHIOS_DIR }}
        run: python3 -X utf8 reproduce_phios.py
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
          # PUPPETEER_EXECUTABLE_PATH 未設定 → Puppeteer bundled Chromium を使用

      - name: Confirm VERIFIED in result
        shell: bash
        run: |
          RESULT="${{ env.PHIOS_DIR }}/reproduce_output/PHIOS_REPRODUCE_RESULT.md"
          if [ -f "$RESULT" ]; then
            grep -E "VERIFIED|L4|PASS|FAIL|SKIP|Hash" "$RESULT" | head -10 || true
          fi

      - name: Upload result (${{ matrix.os }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phios-result-${{ matrix.os }}
          path: ${{ env.PHIOS_DIR }}/reproduce_output/PHIOS_REPRODUCE_RESULT.md
          retention-days: 30

  summary:
    name: Summary
    needs: [reproduce-docker, reproduce-native]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print result
        run: |
          echo "=================================================="
          echo "  PHI-OS Regression CI — Result"
          echo "  Docker  (ubuntu): ${{ needs.reproduce-docker.result }}"
          echo "  Native (mac/win): ${{ needs.reproduce-native.result }}"
          DOCKER="${{ needs.reproduce-docker.result }}"
          NATIVE="${{ needs.reproduce-native.result }}"
          if [ "$DOCKER" = "success" ] && [ "$NATIVE" = "success" ]; then
            echo "  ✅ ALL OS: PHI-OS Proof of Reproducibility VERIFIED (L4)"
          else
            echo "  ❌ 一部またはすべてのOSで失敗"
          fi
          echo "=================================================="
