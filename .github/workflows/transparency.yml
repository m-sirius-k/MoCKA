name: Transparency Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  transparency-check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography

      - name: CI Minimal Chain Test
        run: |
          python .\verify\ci_minimal_chain_test.py

      - name: Key Generation Structure Verify
        run: |
          python .\verify\key_generation_verify_v3.py

      - name: Key Anchor Verify
        run: |
          python .\verify\key_anchor_verify_v3.py

      - name: Key History Verify
        run: |
          python .\verify\key_history_verify_v3.py

      - name: Run Transparency Verify
        shell: pwsh
        run: |
          powershell .\verify_transparency_v2.ps1