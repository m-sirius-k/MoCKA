<svg width="980" height="600" xmlns="http://www.w3.org/2000/svg">

  <text x="490" y="42" text-anchor="middle" font-size="20">
    VAR-005: Repair Proposal Flow
  </text>

  <!-- Anomaly -->
  <rect x="340" y="90" width="300" height="70" fill="#f8d7da" stroke="#000"/>
  <text x="490" y="130" text-anchor="middle" font-size="15">Anomaly Detected</text>

  <!-- Impact Analysis -->
  <rect x="340" y="180" width="300" height="70" fill="#fff3cd" stroke="#000"/>
  <text x="490" y="220" text-anchor="middle" font-size="15">Impact Scope Analysis</text>

  <!-- Proposal -->
  <rect x="340" y="270" width="300" height="70" fill="#e2e3e5" stroke="#000"/>
  <text x="490" y="310" text-anchor="middle" font-size="15">Generate Repair Proposal</text>

  <!-- Repair ID -->
  <rect x="340" y="360" width="300" height="70" fill="#d0e6ff" stroke="#000"/>
  <text x="490" y="400" text-anchor="middle" font-size="15">Assign Repair_ID</text>

  <!-- Ledger -->
  <rect x="340" y="450" width="300" height="70" fill="#f0f0f0" stroke="#000"/>
  <text x="490" y="490" text-anchor="middle" font-size="15">Append Proposal to Ledger</text>

  <!-- Approval -->
  <rect x="340" y="540" width="300" height="40" fill="#d4edda" stroke="#000"/>
  <text x="490" y="565" text-anchor="middle" font-size="14">
    Await Manual Approval or Conditioned Auto-Execution
  </text>

  <!-- Arrows -->
  <line x1="490" y1="160" x2="490" y2="180" stroke="#000"/>
  <line x1="490" y1="250" x2="490" y2="270" stroke="#000"/>
  <line x1="490" y1="340" x2="490" y2="360" stroke="#000"/>
  <line x1="490" y1="430" x2="490" y2="450" stroke="#000"/>
  <line x1="490" y1="520" x2="490" y2="540" stroke="#000"/>

  <!-- Governance Rule -->
  <text x="490" y="595" text-anchor="middle" font-size="11">
    Rule: No blind auto-repair. Every proposal must be traceable and logged.
  </text>

</svg>


